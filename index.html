<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shirt Customization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>Shirt Customization</h2>

<form id="shirtForm">
    <div>
        <label for="waist_size_field">Waist Size (inches):</label>
        <input type="number" id="waist_size_field" name="waist_size_field" required>
    </div>
    <div>
        <label for="length_field">Length from Neck to Waist (inches):</label>
        <input type="number" id="length_field" name="length_field" required>
    </div>
    <div>
        <label for="long_sleeves_checkbox">Long Sleeves:</label>
        <input type="checkbox" id="long_sleeves_checkbox" name="long_sleeves_checkbox">
    </div>
    <div>
        <label for="collar_checkbox">Collar:</label>
        <input type="checkbox" id="collar_checkbox" name="collar_checkbox">
    </div>
    <div>
        <label for="currency_dropdown">Currency:</label>
        <select id="currency_dropdown" name="currency_dropdown">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
        </select>
    </div>
    <div>
        <button type="button" id="calculate_button">Calculate</button>
    </div>
</form>

<h3>Price: <span id="output_price">0</span></h3>

<script>
    document.getElementById("calculate_button").addEventListener("click", function() {
        // Get input values
        var waistSize = parseFloat(document.getElementById("waist_size_field").value);
        var length = parseFloat(document.getElementById("length_field").value);
        var longSleeves = document.getElementById("long_sleeves_checkbox").checked;
        var collar = document.getElementById("collar_checkbox").checked;
        var currency = document.getElementById("currency_dropdown").value;

        // Validate inputs
        if (isNaN(waistSize) || isNaN(length)) {
            alert("Please enter valid waist size and length.");
            return;
        }

        // Calculate base price
        var basePrice = waistSize * length * 0.09;

        // Add options (collar, long sleeves)
        if (collar) basePrice += 2;
        if (longSleeves) basePrice += 5;

        // Apply currency adjustment (if EUR)
        if (currency === "EUR") {
            basePrice *= 0.88;
        }

        // Display the calculated price
        document.getElementById("output_price").innerText = basePrice.toFixed(2) + " " + currency;
    });
</script>

</body>
</html>
